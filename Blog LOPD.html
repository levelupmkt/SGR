<script type="text/babel">
const useWindowSize = () => {
  const [size, setSize] = React.useState({ w: typeof window !== 'undefined' ? window.innerWidth : 1200 });
  React.useEffect(() => {
    const h = () => setSize({ w: window.innerWidth });
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return size;
};

const Ico = ({ n, sz = 18, c = 'currentColor', sw = 1.8 }) => {
  const icons = {
    arrow_r: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
    arrow_l: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
    menu: <><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>,
    x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    calendar: <><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
    globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></>,
    phone: <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 011.18 2a2 2 0 012-.18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.9z"/>,
    mail: <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,
    shield: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>,
    lock: <><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></>,
    check_circle: <><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
    alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
    file: <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></>,
    user: <><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
  };
  return (
    <svg viewBox="0 0 24 24" width={sz} height={sz} fill="none" stroke={c} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{ display:'block', flexShrink:0 }}>
      {icons[n] || <circle cx="12" cy="12" r="8"/>}
    </svg>
  );
};

const BtnPrimary = ({ children, href, size='md', sx={} }) => {
  const [hov, setHov] = React.useState(false);
  const pads = { sm:'9px 22px', md:'13px 30px', lg:'16px 40px' };
  const fss = { sm:13, md:15, lg:16 };
  return (
    <a href={href} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display:'inline-flex', alignItems:'center', gap:8,
        background: hov ? '#1EC4CA' : '#29D9DF', color:'#001845', borderRadius:50,
        fontFamily:'inherit', fontWeight:700, fontSize:fss[size], padding:pads[size],
        textDecoration:'none', transition:'all 220ms ease',
        transform: hov ? 'translateY(-2px)' : 'translateY(0)',
        boxShadow: hov ? '0 10px 28px rgba(41,217,223,0.4)' : '0 4px 14px rgba(41,217,223,0.25)',
        whiteSpace:'nowrap', ...sx }}>
      {children}
    </a>
  );
};

const NavLink = ({ href, children }) => {
  const [hov, setHov] = React.useState(false);
  return (
    <a href={href} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ padding:'8px 14px', fontSize:14, fontWeight:600,
        color: hov ? '#fff' : 'rgba(255,255,255,0.72)',
        textDecoration:'none', borderRadius:6,
        background: hov ? 'rgba(255,255,255,0.09)' : 'transparent',
        transition:'all 200ms ease' }}>
      {children}
    </a>
  );
};

const Header = () => {
  const [scrolled, setScrolled] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const { w } = useWindowSize();
  const isMobile = w < 900;
  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h, { passive:true });
    return () => window.removeEventListener('scroll', h);
  }, []);
  const navItems = ['Producto','Soluciones','Planes','Blog','Contacto'];
  return (
    <header style={{ position:'fixed', top:0, left:0, right:0, zIndex:1000,
      background: scrolled || menuOpen ? 'rgba(0,10,38,0.95)' : 'rgba(0,10,38,0.85)',
      backdropFilter:'blur(20px)',
      borderBottom: scrolled ? '1px solid rgba(255,255,255,0.07)' : '1px solid transparent',
      transition:'all 300ms ease' }}>
      <div style={{ maxWidth:1200, margin:'0 auto', height:72, display:'flex', alignItems:'center', padding:'0 24px', gap:40 }}>
        <a href="SGR Landing.html" style={{ display:'flex', alignItems:'center', flexShrink:0, textDecoration:'none' }}>
          <img src={window.BLOG_ASSETS.logo} alt="SGR" style={{ height:38 }} />
        </a>
        {!isMobile &&
          <nav style={{ display:'flex', gap:2, flex:1, justifyContent:'center' }}>
            {navItems.map(l => <NavLink key={l} href={`SGR Landing.html#${l.toLowerCase()}`}>{l}</NavLink>)}
          </nav>
        }
        <div style={{ marginLeft:'auto', display:'flex', gap:12, alignItems:'center', flexShrink:0 }}>
          {!isMobile && <a href="SGR Landing.html#" style={{ fontSize:14, fontWeight:600, color:'rgba(255,255,255,0.6)', textDecoration:'none' }}>Iniciar sesión</a>}
          {!isMobile && <BtnPrimary href="SGR Landing.html#contacto" size="sm">Agenda un demo</BtnPrimary>}
          {isMobile &&
            <button onClick={() => setMenuOpen(o => !o)}
              style={{ background:'transparent', border:'none', cursor:'pointer', padding:6, color:'#fff', display:'flex' }}>
              <Ico n={menuOpen ? 'x' : 'menu'} sz={22} c="#fff" />
            </button>
          }
        </div>
      </div>
      {isMobile && menuOpen &&
        <div style={{ background:'rgba(0,10,38,0.98)', borderTop:'1px solid rgba(255,255,255,0.07)', padding:'12px 24px 24px' }}>
          {navItems.map(l =>
            <a key={l} href={`SGR Landing.html#${l.toLowerCase()}`} onClick={() => setMenuOpen(false)}
              style={{ display:'block', padding:'14px 0', fontSize:16, fontWeight:600,
                color:'rgba(255,255,255,0.82)', textDecoration:'none',
                borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
              {l}
            </a>
          )}
          <div style={{ marginTop:20 }}>
            <BtnPrimary href="SGR Landing.html#contacto" sx={{ justifyContent:'center' }}>Agenda un demo gratis</BtnPrimary>
          </div>
        </div>
      }
    </header>
  );
};

const FooterSection = () => {
  const { w } = useWindowSize();
  const isMobile = w < 768;
  const cols = [
    { title:'Producto', links:['Funcionalidades','Administración','Finanzas','Seguridad','Mantenimiento','Reservas'] },
    { title:'Soluciones', links:['Para administradores','Para residentes','Para guardias','Para técnicos','Para comités'] },
    { title:'Recursos', links:['Blog','Novedades','Preguntas frecuentes','Centro de ayuda'] },
    { title:'Empresa', links:['Contacto','Agenda demo','Sobre Código Plus','Términos y condiciones','Política de privacidad'] }

  return (
    <footer style={{ padding:'64px 0 32px', background:'rgb(0,43,107)' }}>
      <div style={{ maxWidth:1200, margin:'0 auto', padding:'0 24px' }}>
        <div style={{ background:'linear-gradient(135deg,#0046B0,#003A90)', borderRadius:16,
          padding: isMobile ? '28px 24px' : '36px 40px',
          display:'flex', alignItems:'center', justifyContent:'space-between',
          flexWrap:'wrap', gap:20, marginBottom:64 }}>
          <div>
            <h3 style={{ fontSize: isMobile ? 20 : 26, fontWeight:800, color:'#fff', letterSpacing:'-0.02em', marginBottom:6 }}>¿Listo para dejar atrás el desorden administrativo?</h3>
            <p style={{ fontSize:15, color:'rgba(255,255,255,0.65)' }}>Agenda un demo y descubre cómo SGR transforma tu comunidad.</p>
          </div>
          <BtnPrimary href="SGR Landing.html#contacto" size="lg" sx={{ background:'#29D9DF', color:'#002B6B', boxShadow:'0 4px 16px rgba(41,217,223,0.35)' }}>Agendar demo ahora</BtnPrimary>
        </div>
        <div style={{ display:'grid', gridTemplateColumns: isMobile ? '1fr 1fr' : `2fr ${cols.map(() => '1fr').join(' ')}`, gap:'40px 32px', marginBottom:56 }}>
          <div style={{ gridColumn: isMobile ? '1/-1' : 'auto' }}>
            <div style={{ marginBottom:16 }}>
              <img src={window.BLOG_ASSETS.logo} alt="SGR" style={{ height:34 }} />
            </div>
            <p style={{ fontSize:13, color:'rgba(255,255,255,0.38)', lineHeight:1.7, maxWidth:240, marginBottom:20 }}>
              Plataforma para modernizar la administración de urbanizaciones y condominios en Ecuador.
            </p>
